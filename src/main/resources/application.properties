# Server port - Railway/Render set PORT automatically
server.port=${PORT:8080}

# Database - set these as environment variables on Railway/Render
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/advanced_billing_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Allow serving static files (frontend)
spring.web.resources.static-locations=classpath:/static/
