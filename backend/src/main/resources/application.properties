spring.application.name=billing-system

# ─── Database (Supabase PostgreSQL) ───────────────────────────────────────────
# Set these as environment variables in Railway / local .env
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Generate your own: openssl rand -base64 64
jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVEJpbGxpbmdTeXN0ZW0yMDI0U2VjdXJlS2V5SGVyZQ==}
jwt.expiration=86400000

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
